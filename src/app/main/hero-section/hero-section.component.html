<section>
    <div>
        <span>{{ 'hero.headline' | translate }}</span>
        <p class="headline">Marcel Zalec</p>
        <div class="buttons">
            <button><p>{{ 'hero.work' | translate }}</p></button>
            <button href="contact"><p>{{ 'hero.contact' | translate }}</p></button>
        </div>
        <div class="info-box">
            <div class="info-box-text" *ngFor="let item of 'hero.slider' | translate">
                <span >{{ item.slide }}</span>
                <div class="circleGreen"></div>
            </div>
        </div>
        <div class="arrow-down">
            <div class="line"></div>
            <svg width="48" height="48" viewBox="0 0 30 48" fill="none" xmlns="http://www.w3.org/2000/svg">
                <rect x="0.5" y="0.5" width="29" height="47" rx="14.5" stroke="#3DCFB6"/>
                <path d="M15.5 18C15.5 17.7239 15.2761 17.5 15 17.5C14.7239 17.5 14.5 17.7239 14.5 18H15.5ZM14.6464 30.3536C14.8417 30.5488 15.1583 30.5488 15.3536 30.3536L18.5355 27.1716C18.7308 26.9763 18.7308 26.6597 18.5355 26.4645C18.3403 26.2692 18.0237 26.2692 17.8284 26.4645L15 29.2929L12.1716 26.4645C11.9763 26.2692 11.6597 26.2692 11.4645 26.4645C11.2692 26.6597 11.2692 26.9763 11.4645 27.1716L14.6464 30.3536ZM14.5 18V30H15.5V18H14.5Z" fill="white"/>
